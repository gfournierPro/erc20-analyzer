version: '3.9'

services:
    postgres:
        image: postgres:16-alpine
        container_name: erc20_postgres
        environment:
            POSTGRES_USER: analyzer
            POSTGRES_PASSWORD: analyzer
            POSTGRES_DB: erc20
        ports:
            - "5432:5432"
        volumes:
            - pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U analyzer"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: erc20_redis
        ports:
            - "6379:6379"
        # volumes:
            # - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5

    kafka:
        image: confluentinc/cp-kafka:7.6.1
        volumes:
            - kafka_data:/var/lib/kafka/data
        container_name: erc20_kafka
        ports:
        - "9092:9092"   # external (host)
        - "9094:9094"   # controller
        environment:
            # KRaft mode (no Zookeeper)
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9094,INTERNAL://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:9093
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
            CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
        healthcheck:
            test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 10

    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: erc20_kafka_ui
        ports:
        - "8090:8080"
        environment:
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9093
        depends_on:
        - kafka

    prometheus:
        image: prom/prometheus:latest
        container_name: erc20_prometheus
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml
        ports:
            - "9090:9090"

    grafana:
        image: grafana/grafana:latest
        container_name: erc20_grafana
        ports:
            - "3000:3000"
        depends_on:
            - prometheus
        environment:
            GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
    pg_data:
    kafka_data:
version: '3.9'

services:
    postgres:
        image: postgres:16-alpine
        container_name: erc20_postgres
        environment:
            POSTGRES_USER: analyzer
            POSTGRES_PASSWORD: analyzer
            POSTGRES_DB: erc20
        ports:
            - "5432:5432"
        volumes:
            - pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U analyzer"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: erc20_redis
        ports:
            - "6379:6379"
        # volumes:
            # - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5

    nats:
        image: nats:2.10-alpine
        container_name: erc20_nats
        command: ["-js", "-m", "8222"]
        ports:
            - "4222:4222" #client 
            - "8222:8222" #monitoring 
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
            interval: 5s
            timeout: 3s
            retries: 5

    prometheus:
        image: prom/prometheus:latest
        container_name: erc20_prometheus
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml
        ports:
            - "9090:9090"

    grafana:
        image: grafana/grafana:latest
        container_name: erc20_grafana
        ports:
            - "3000:3000"
        depends_on:
            - prometheus
        environment:
            GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
    pg_data: